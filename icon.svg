<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Truco">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a4a22"/>
      <stop offset="1" stop-color="#3c2410"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf6"/>
      <stop offset="1" stop-color="#efe6cf"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7ecf2"/>
      <stop offset="1" stop-color="#9aa6b2"/>
    </linearGradient>
  </defs>

  <!-- fondo madera con borde dorado -->
  <rect x="10" y="10" width="492" height="492" rx="116" fill="url(#wood)"/>
  <rect x="10" y="10" width="492" height="492" rx="116" fill="none" stroke="#d8b53e" stroke-width="12"/>

  <!-- sol de mayo (crest) -->
  <g transform="translate(256 116)">
    <g fill="#f2b021">
      <g id="rays">
        <polygon points="0,-62 7,-40 -7,-40"/>
      </g>
      <use href="#rays" transform="rotate(30)"/>
      <use href="#rays" transform="rotate(60)"/>
      <use href="#rays" transform="rotate(90)"/>
      <use href="#rays" transform="rotate(120)"/>
      <use href="#rays" transform="rotate(150)"/>
      <use href="#rays" transform="rotate(180)"/>
      <use href="#rays" transform="rotate(210)"/>
      <use href="#rays" transform="rotate(240)"/>
      <use href="#rays" transform="rotate(270)"/>
      <use href="#rays" transform="rotate(300)"/>
      <use href="#rays" transform="rotate(330)"/>
    </g>
    <circle r="34" fill="#f6b40e" stroke="#c98a14" stroke-width="3"/>
  </g>

  <!-- abanico de 3 cartas españolas -->
  <!-- carta izquierda -->
  <g transform="rotate(-16 256 348)">
    <rect x="192" y="172" width="128" height="178" rx="14" fill="url(#card)" stroke="#cdbf9a" stroke-width="3"/>
    <text x="208" y="208" font-family="Georgia,'Times New Roman',serif" font-size="34" font-weight="700" fill="#b08d2e">6</text>
  </g>
  <!-- carta derecha -->
  <g transform="rotate(16 256 348)">
    <rect x="192" y="172" width="128" height="178" rx="14" fill="url(#card)" stroke="#cdbf9a" stroke-width="3"/>
    <text x="208" y="208" font-family="Georgia,'Times New Roman',serif" font-size="34" font-weight="700" fill="#b08d2e">7</text>
  </g>
  <!-- carta central: 1 de espada -->
  <g>
    <rect x="190" y="160" width="132" height="184" rx="15" fill="url(#card)" stroke="#b08d2e" stroke-width="3.5"/>
    <text x="206" y="196" font-family="Georgia,'Times New Roman',serif" font-size="34" font-weight="700" fill="#1f3a6e">1</text>
    <text x="306" y="320" font-family="Georgia,'Times New Roman',serif" font-size="34" font-weight="700" fill="#1f3a6e" text-anchor="end" transform="rotate(180 300 310)">1</text>
    <!-- espada -->
    <g transform="translate(256 252)">
      <rect x="-6" y="-58" width="12" height="92" rx="4" fill="url(#steel)" stroke="#7d8893" stroke-width="1.5"/>
      <polygon points="-6,-58 6,-58 0,-72" fill="url(#steel)" stroke="#7d8893" stroke-width="1.5"/>
      <rect x="-26" y="34" width="52" height="11" rx="5" fill="#c0392b"/>
      <rect x="-5" y="44" width="10" height="26" rx="3" fill="#9c2b20"/>
      <circle cx="0" cy="74" r="9" fill="#d8b53e" stroke="#a87f1f" stroke-width="2"/>
    </g>
  </g>

  <!-- cinta celeste y blanca con TRUCO -->
  <g>
    <rect x="56" y="372" width="400" height="74" rx="14" fill="#74acdf"/>
    <rect x="56" y="392" width="400" height="34" fill="#ffffff"/>
    <text x="256" y="418" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="42" font-weight="900" letter-spacing="3" fill="#2c3e66">TRUCO</text>
  </g>
</svg>
