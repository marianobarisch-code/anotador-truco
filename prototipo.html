<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#3a2414">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Truco">
<title>Truco · Anotador</title>
<style>
  :root{ --gold:#d8b53e; --gold-soft:#b08d2e; --line:#b08d2e; --ink:#3a2414; --stick:#ece0c2; --tip:#c0392b; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; overflow:hidden; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:#fff; background:#15100b; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
  button{ font-family:inherit; }

  /* Marco tamaño celular: centrado, mismo look en compu o teléfono */
  .frame{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:100%; height:100%; max-width:430px; max-height:920px; overflow:hidden; box-shadow:0 0 50px rgba(0,0,0,0.55); }

  .wood{ position:absolute; inset:0; z-index:0; }
  .planks{ position:absolute; inset:0; z-index:1; pointer-events:none;
    background:repeating-linear-gradient(90deg, rgba(0,0,0,0) 0 86px, rgba(0,0,0,0.26) 87px 89px, rgba(255,255,255,0.04) 90px 91px); }

  .app{ position:absolute; inset:0; z-index:2; display:flex; flex-direction:column; }

  header{ flex:0 0 auto; height:calc(54px + env(safe-area-inset-top)); padding-top:env(safe-area-inset-top);
    background:#3a2414; border-bottom:1.5px solid var(--gold-soft);
    display:flex; align-items:center; justify-content:space-between; padding-left:12px; padding-right:12px; }
  .cbtn{ width:36px; height:36px; border-radius:50%; border:1.5px solid var(--gold-soft); background:transparent;
    color:var(--gold-soft); font-size:19px; display:flex; align-items:center; justify-content:center; }
  .htitle{ color:var(--gold); font-size:19px; font-weight:600; letter-spacing:.4px; }

  .view{ flex:1 1 auto; position:relative; overflow:hidden; }
  .scroll{ position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px; }

  /* ---- Anotador ---- */
  .heads{ display:flex; padding:14px 0 0; }
  .heads > div{ flex:1; text-align:center; padding:0 6px; }
  .heads .nm{ color:#fff; font-size:21px; font-weight:500; border-bottom:2px solid var(--gold); padding:0 12px 4px; display:inline-block; }
  .heads .pl{ display:block; color:#e7d6a8; font-size:12px; margin-top:7px; line-height:1.45; }
  .board{ position:absolute; left:0; right:0; top:104px; bottom:8px; }
  .vline{ position:absolute; left:50%; top:0; bottom:0; width:1.5px; background:var(--line); transform:translateX(-50%); }
  .hline{ position:absolute; left:62px; right:62px; top:50%; height:1.5px; background:var(--line); transform:translateY(-50%); }
  .col{ position:absolute; width:50%; display:flex; flex-direction:column; align-items:center; gap:8px; }
  /* Fósforos grandes: malas llenan desde abajo de los nombres hasta la cruz; buenas desde la cruz hacia abajo. Simétricos. */
  .malas{ top:0; height:50%; justify-content:space-between; padding:42px 0 10px; }
  .buenas{ top:50%; height:50%; justify-content:space-between; padding:10px 0 26px; }
  .cnos{ left:0; } .cell{ right:0; }
  .slot-sq{ width:80px; height:80px; display:flex; align-items:center; justify-content:center; }
  .col svg{ width:80px; height:80px; }
  .ctrls{ position:absolute; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:18px; z-index:3; }
  .ctrls.l{ left:6px; } .ctrls.r{ right:6px; }
  .rbtn{ width:50px; height:50px; border-radius:50%; border:2.5px solid #fff; background:rgba(0,0,0,0.12); color:#fff; font-size:27px; touch-action:manipulation; }
  .rbtn:active{ transform:scale(.92); }
  .score-pill{ position:absolute; top:6px; left:50%; transform:translateX(-50%); z-index:3; display:flex; gap:18px; align-items:center;
    background:rgba(0,0,0,0.3); border:1px solid var(--gold-soft); border-radius:20px; padding:4px 16px; font-size:14px; }

  /* ---- Empty state ---- */
  .empty{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:24px; text-align:center; }
  .empty .ic{ width:80px; height:80px; border-radius:50%; border:2px solid var(--gold-soft); display:flex; align-items:center; justify-content:center; color:var(--gold-soft); font-size:38px; }
  .empty .logo{ width:132px; height:132px; filter:drop-shadow(0 6px 14px rgba(0,0,0,0.4)); }
  .empty p{ color:#cdbf9a; font-size:15px; margin:0; }
  .estack{ width:100%; max-width:300px; display:flex; flex-direction:column; gap:12px; }
  .jbanner{ display:flex; align-items:center; gap:11px; padding:13px 15px; border-radius:12px; border:1px solid var(--gold-soft); background:rgba(216,181,62,0.1); text-align:left; }
  .jdot{ width:10px; height:10px; border-radius:50%; background:#7ec47e; box-shadow:0 0 8px #7ec47e; flex:0 0 auto; }
  .jbtxt{ display:flex; flex-direction:column; min-width:0; }
  .jbtxt b{ color:#f0e2b6; font-size:15px; font-weight:600; }
  .jbtxt span{ color:#cdbf9a; font-size:12px; }

  .primary{ background:var(--gold); color:var(--ink); border:none; border-radius:12px; padding:15px 28px; font-size:17px; font-weight:600; }
  .primary:active{ transform:scale(.98); }
  .ghost{ background:rgba(0,0,0,0.25); color:#fff; border:1px solid var(--gold-soft); border-radius:12px; padding:14px 22px; font-size:15px; }
  .full{ width:100%; } .danger{ border-color:#c0392b; color:#f0b8b0; }

  /* bottom action bar */
  .actions{ flex:0 0 auto; display:flex; gap:10px; padding:12px 14px calc(14px + env(safe-area-inset-bottom)); background:rgba(0,0,0,0.18); border-top:1px solid rgba(176,141,46,0.4); }

  /* ---- Nueva partida ---- */
  .label{ color:#e7d6a8; font-size:13px; margin:0 0 8px 2px; }
  .modes{ display:flex; gap:10px; margin-bottom:18px; }
  .mode{ flex:1; text-align:center; padding:12px 0; border-radius:10px; border:1px solid #6e5024; background:rgba(0,0,0,0.18); color:#cdbf9a; font-size:15px; }
  .mode.on{ border:2px solid var(--gold); background:rgba(216,181,62,0.12); color:#f0e2b6; font-weight:500; }
  .mode .sub{ display:block; font-size:11px; color:#cdbf9a; margin-top:3px; font-weight:400; }
  /* dropdown torneo */
  .ddwrap{ position:relative; margin-bottom:18px; }
  .dropdown{ width:100%; padding:13px 38px 13px 13px; border-radius:10px; border:1px solid #6e5024; background:rgba(0,0,0,0.25);
    color:#f0e2b6; font-size:15px; font-family:inherit; -webkit-appearance:none; appearance:none; outline:none; }
  .dropdown:focus{ border-color:var(--gold); }
  .ddchev{ position:absolute; right:12px; top:50%; transform:translateY(-50%); pointer-events:none; color:#cdbf9a; display:flex; }
  /* inputs de apuesta custom */
  .apinputs{ display:flex; gap:10px; margin-bottom:18px; }
  .apinputs > div{ flex:1; }
  .apinputs .label{ font-size:11px; margin:0 0 5px 2px; }
  .apin{ display:flex; align-items:center; gap:6px; background:rgba(0,0,0,0.3); border:1px solid var(--gold-soft); border-radius:10px; padding:0 12px; }
  .apin:focus-within{ border-color:var(--gold); }
  .apin .ps{ color:var(--gold); font-size:16px; }
  .apin input{ flex:1; min-width:0; background:transparent; border:none; outline:none; color:#fff; font-size:16px; padding:12px 0; }
  .apin input::placeholder{ color:#9c8a63; }
  .teamblock{ margin-bottom:16px; }
  .slot{ display:flex; align-items:center; justify-content:space-between; border-radius:10px; padding:11px 12px; margin-bottom:8px; font-size:15px; }
  .slot.filled{ background:rgba(216,181,62,0.14); border:1px solid var(--gold-soft); color:#fff; }
  .slot.vacia{ background:rgba(0,0,0,0.18); border:1px dashed #6e5024; color:#9c8a63; }
  .slot i{ font-size:18px; color:#cdbf9a; }

  /* ---- Ranking ---- */
  .sorts{ display:flex; gap:8px; overflow-x:auto; margin-bottom:14px; padding-bottom:2px; }
  .chip{ flex:0 0 auto; padding:8px 14px; border-radius:20px; border:1px solid #6e5024; background:rgba(0,0,0,0.2); color:#cdbf9a; font-size:13px; }
  .chip.on{ border-color:var(--gold); background:rgba(216,181,62,0.15); color:#f0e2b6; }
  .rk-head, .rk-row{ display:flex; align-items:center; padding:10px 8px; }
  .rk-head{ color:#9c8a63; font-size:12px; border-bottom:1px solid rgba(176,141,46,0.4); }
  .rk-row{ border-bottom:1px solid rgba(176,141,46,0.18); }
  .rk-name{ flex:1; display:flex; align-items:center; gap:9px; min-width:0; }
  .rk-name .pos{ width:20px; color:var(--gold); font-size:13px; text-align:center; flex:0 0 auto; }
  .rk-name .full2{ font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .stat{ width:34px; text-align:center; font-size:14px; color:#d8cba0; flex:0 0 auto; }
  .stat.on{ color:#fff; font-weight:600; }
  .stat.money{ width:56px; font-size:13px; }
  .stat.pos{ color:#7ec47e; } .stat.neg{ color:#e08b80; }
  .rk-head .stat{ font-size:12px; color:#9c8a63; }
  .rk-empty{ text-align:center; color:#9c8a63; font-size:14px; padding:34px 16px; line-height:1.6; }

  /* ---- Jornadas (sesiones) ---- */
  .jlist{ display:flex; flex-direction:column; }
  .jrow{ display:flex; align-items:center; gap:10px; padding:14px 6px; border-bottom:1px solid rgba(176,141,46,0.18); }
  .jr-main{ flex:1; min-width:0; }
  .jr-date{ font-size:15px; color:#fff; }
  .jr-live{ font-size:10px; color:#15100b; background:#7ec47e; border-radius:10px; padding:1px 7px; margin-left:6px; vertical-align:1px; }
  .jr-sub{ font-size:12px; color:#9c8a63; margin-top:3px; }
  .jr-tot{ font-size:14px; color:#d8cba0; flex:0 0 auto; }
  .jr-chev{ color:#6e5024; display:flex; }
  .jdhead{ padding:6px 2px 12px; border-bottom:1px solid rgba(176,141,46,0.3); margin-bottom:8px; }
  .jd-date{ font-size:19px; color:var(--gold); font-weight:600; }
  .jd-sub{ font-size:12px; color:#9c8a63; margin-top:4px; }
  .sd-list,.pay-list{ display:flex; flex-direction:column; }
  .sd-row{ display:flex; align-items:center; justify-content:space-between; padding:11px 6px; border-bottom:1px solid rgba(176,141,46,0.16); }
  .sd-name{ font-size:15px; color:#fff; }
  .sd-amt{ font-size:15px; font-weight:600; color:#d8cba0; }
  .sd-amt.pos{ color:#7ec47e; } .sd-amt.neg{ color:#e08b80; }
  .pay-row{ display:flex; align-items:center; gap:9px; padding:12px 13px; margin-bottom:8px; border:1px solid var(--gold-soft); border-radius:10px; background:rgba(216,181,62,0.08); }
  .pay-de{ color:#e08b80; font-size:14px; }
  .pay-arrow{ color:#cdbf9a; display:flex; }
  .pay-a{ color:#7ec47e; font-size:14px; }
  .pay-m{ margin-left:auto; color:#f0e2b6; font-weight:600; font-size:15px; }
  .pt-list{ display:flex; flex-direction:column; }
  .pt-row{ display:flex; align-items:center; gap:10px; padding:10px 6px; border-bottom:1px solid rgba(176,141,46,0.16); }
  .pt-main{ flex:1; min-width:0; }
  .pt-win{ font-size:14px; color:#f0e2b6; display:flex; align-items:center; gap:6px; }
  .pt-win svg{ color:var(--gold-soft); flex:0 0 auto; }
  .pt-sub{ font-size:12px; color:#9c8a63; margin-top:3px; }
  .pt-del{ flex:0 0 auto; width:36px; height:36px; border-radius:9px; border:1px solid rgba(192,57,43,0.5); background:rgba(192,57,43,0.12); color:#e08b80; display:flex; align-items:center; justify-content:center; }
  .pt-del:active{ transform:scale(.92); }
  .del-btn{ background:#c0392b; color:#fff; border:none; border-radius:12px; padding:14px 22px; font-size:15px; font-weight:600; }
  .del-btn:active{ transform:scale(.98); }

  /* ---- Overlays ---- */
  .scrim{ position:absolute; inset:0; z-index:20; background:rgba(0,0,0,0.55); display:none; }
  .scrim.show{ display:block; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; background:#41291655; backdrop-filter:blur(2px);
    border-top-left-radius:18px; border-top-right-radius:18px; }
  .sheet-inner{ background:#3a2414; border-top:2px solid var(--gold-soft); border-top-left-radius:18px; border-top-right-radius:18px;
    max-height:72vh; display:flex; flex-direction:column; padding-bottom:env(safe-area-inset-bottom); }
  .sheet h3{ margin:0; padding:16px 16px 10px; font-size:16px; color:var(--gold); }
  .search{ margin:0 16px 8px; display:flex; align-items:center; gap:8px; background:rgba(0,0,0,0.3); border:1px solid var(--gold-soft); border-radius:10px; padding:0 12px; }
  .search input{ flex:1; background:transparent; border:none; outline:none; color:#fff; font-size:15px; padding:12px 0; }
  .search input::placeholder{ color:#9c8a63; }
  .plist{ overflow-y:auto; flex:1 1 auto; min-height:0; }
  .addrow{ display:flex; align-items:center; gap:11px; margin:2px 16px 10px; padding:12px 13px; border:1px solid var(--gold-soft); border-radius:10px; background:rgba(216,181,62,0.12); }
  .addrow .addic{ display:flex; color:var(--gold); }
  .addrow .addmain{ font-size:15px; color:#f0e2b6; }
  .addrow .addsub{ font-size:12px; color:#cdbf9a; }
  .addrow.hint{ background:rgba(0,0,0,0.16); border-style:dashed; border-color:#6e5024; }
  .addrow.hint .addic{ color:#9c8a63; }
  .addrow.hint .addsub{ color:#9c8a63; }
  .pitem{ display:flex; align-items:center; gap:10px; padding:13px 16px; border-top:1px solid rgba(176,141,46,0.18); font-size:15px; color:#fff; }
  .pitem.dis{ opacity:.42; }
  .pitem .tag{ margin-left:auto; font-size:11px; color:#cdbf9a; border:1px solid #8a6d34; border-radius:20px; padding:1px 8px; }
  .pitem.create{ color:var(--gold); }
  .pitem i{ font-size:18px; color:#cdbf9a; }
  .pitem.create i{ color:var(--gold); }

  .menu{ position:absolute; top:0; left:0; bottom:0; width:74%; max-width:300px; background:#3a2414; border-right:2px solid var(--gold-soft);
    transform:translateX(-105%); transition:transform .22s ease; padding-top:env(safe-area-inset-top); }
  .scrim.show .menu{ transform:translateX(0); }
  .menu .mtitle{ color:var(--gold); font-size:18px; font-weight:600; padding:20px 18px 10px; border-bottom:1px solid rgba(176,141,46,0.4); }
  .mitem{ display:flex; align-items:center; gap:12px; padding:16px 18px; font-size:16px; color:#fff; border-bottom:1px solid rgba(176,141,46,0.15); }
  .mitem i{ color:var(--gold-soft); font-size:20px; }

  .modal{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:84%; max-width:330px;
    background:#3a2414; border:2px solid var(--gold); border-radius:16px; padding:24px; text-align:center; }
  .modal .trophy{ font-size:42px; color:var(--gold); }
  .modal h2{ margin:6px 0 4px; font-size:24px; color:var(--gold); }
  .modal p{ margin:0 0 18px; color:#e7d6a8; font-size:15px; }
  .modal .row{ display:flex; gap:10px; }
  .modal .row > *{ flex:1; }
  svg.icn{ display:inline-block; vertical-align:-3px; }
</style>
</head>
<body>
<div class="frame">
<div class="wood"></div>
<div class="planks"></div>
<div class="app">
  <header>
    <button class="cbtn" id="hmenu" data-action="menu:open" aria-label="Menú"></button>
    <div class="htitle" id="htitle">Anotador</div>
    <button class="cbtn" id="hright" aria-label="Acción"></button>
  </header>
  <div class="view" id="view"></div>
  <div id="actionbar"></div>
</div>

<div class="scrim" id="scrim"></div>
</div>

<svg width="0" height="0" style="position:absolute"><defs>
  <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9 0.012" numOctaves="5" seed="14" result="n"/>
    <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.30  0 0 0 0 0.17  0 0 0 0 0.07  0.75 0 0 0 -0.18"/></filter>
</defs></svg>

<script>
(function(){
  var LIMIT=30;
  var ICON={
    menu:'<path d="M4 6h16M4 12h16M4 18h16"/>',
    trash:'<path d="M4 7h16M10 11v6M14 11v6M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1 -1l1 -13M9 7V4a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3"/>',
    cards:'<rect x="3.5" y="6" width="11" height="14" rx="2"/><path d="M9.5 5.6l5.6 -1l4 11l-3.4 1.7"/>',
    chevron:'<path d="M6 9l6 6l6 -6"/>',
    x:'<path d="M6 6l12 12M18 6l-12 12"/>',
    search:'<circle cx="10" cy="10" r="7"/><path d="M21 21l-6 -6"/>',
    user:'<circle cx="12" cy="8" r="4"/><path d="M6 21v-1a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v1"/>',
    plus:'<path d="M12 5v14M5 12h14"/>',
    trophy:'<path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1 -10 0zM7 6H4v1a3 3 0 0 0 3 3M17 6h3v1a3 3 0 0 0 -3 3"/>',
    arrow:'<path d="M5 12h14M13 6l6 6l-6 6"/>',
    cal:'<rect x="3.5" y="5" width="17" height="16" rx="2"/><path d="M3.5 9h17M8 3v4M16 3v4"/>'
  };
  function ic(n,sz){ sz=sz||22; return '<svg class="icn" viewBox="0 0 24 24" width="'+sz+'" height="'+sz+'" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ICON[n]+'</svg>'; }
  var API_URL="https://script.google.com/macros/s/AKfycbxG82ZhM4mRR5a-UXmzy-3-f6VEYGfTgTnK2_Dz2qW5BX6vnudykW9b7A9s8VQgXjN0iA/exec";
  var API_TOKEN="truco-barisch-7H2k9";

  var state={
    view:"anotador",
    players:[],
    partidas:[],
    nextId:1,
    active:null,
    jornada:null,          // {id, inicio}  — jornada (sesión) abierta (compartida, del servidor)
    jornadaSel:null,       // jid en pantalla de detalle
    jornadaBusy:false,     // abriendo/cerrando jornada contra el servidor
    confirm:null,          // {msg, action, id} para el modal de confirmación
    setup:{torneo:null, modo:3, teams:[[null,null,null],[null,null,null]], apuesta:{preset:"custom", simple:null, doble:null}},
    rankSort:"g",
    rankScope:"global",
    sheet:null,
    search:"",
    cargando:true,
    errorMsg:"",
    guardando:false
  };

  /* ---------- helpers ---------- */
  var $=function(s,r){return (r||document).querySelector(s);};
  // Escapa texto de usuario antes de meterlo en innerHTML (evita romper/inyectar desde un nombre).
  var ESC_MAP={"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"};
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return ESC_MAP[c];}); }
  document.querySelector(".wood").style.cssText+=";background:#5e3a20;";
  document.querySelector(".wood").innerHTML='<svg preserveAspectRatio="none" viewBox="0 0 400 900" style="width:100%;height:100%"><rect width="400" height="900" fill="#5e3a20"/><rect width="400" height="900" filter="url(#grain)"/></svg>';
  $("#hmenu").innerHTML=ic("menu",20);

  function player(id){ return state.players.find(function(p){return p.id===id;}); }
  function fullname(p){ return p.nombre+" "+p.apellido; }
  // Normaliza un nombre para comparar (sin mayúsculas, sin espacios de más) → evita duplicados.
  function norm2(s){ return String(s==null?"":s).trim().replace(/\s+/g," ").toLowerCase(); }
  function chosenIds(){ var a=[]; state.setup.teams.forEach(function(t){t.forEach(function(id){if(id)a.push(id);});}); return a; }
  function miles(n){ return String(Math.abs(n)).replace(/\B(?=(\d{3})+(?!\d))/g,"."); }
  function pesos(n){ return "$"+miles(n); }                                  // $10.000
  function plataCorta(n){ var a=Math.abs(n), s=n<0?"−":(n>0?"+":""), str;     // +$10k / −$2.5k
    if(a>=1000){ var k=a/1000; str=(k%1===0?k:k.toFixed(1).replace(/\.0$/,""))+"k"; } else { str=""+a; }
    return s+"$"+str; }
  function pesosFirmado(n){ return (n<0?"−":(n>0?"+":""))+"$"+miles(n); }       // +$5.000 / −$5.000

  /* ---------- Jornadas (una sesión = varios partidos de una misma noche) ---------- */
  var LS_JOR="truco_jornada_v1";
  // Cierre automático: las 6:00 AM siguientes al inicio (cubre el caso 20:00 → 01:00).
  function cierre6(inicioMs){ var d=new Date(inicioMs), c=new Date(inicioMs);
    if(d.getHours()<6){ c.setHours(6,0,0,0); } else { c.setDate(c.getDate()+1); c.setHours(6,0,0,0); }
    return c.getTime(); }
  function loadJornada(){
    try{ var raw=localStorage.getItem(LS_JOR); if(!raw) return null; var j=JSON.parse(raw);
      if(!j||!j.inicio) return null;
      if(Date.now()>=cierre6(j.inicio)){ localStorage.removeItem(LS_JOR); return null; } // ya pasó las 6 AM → cerrada sola
      return j;
    }catch(e){ return null; } }
  function saveJornada(j){ try{ if(j) localStorage.setItem(LS_JOR, JSON.stringify(j)); else localStorage.removeItem(LS_JOR); }catch(e){} }
  // La jornada abierta es del SERVIDOR (compartida entre todos). El localStorage es solo caché para UI instantánea/offline.
  function setJornada(srv){ var ms=new Date(srv.inicio).getTime(); if(isNaN(ms)) ms=Number(srv.id)||Date.now();
    state.jornada={id:String(srv.id), inicio:ms}; saveJornada(state.jornada); }
  function startJornada(){
    if(state.jornadaBusy) return;
    state.jornadaBusy=true; state.errorMsg=""; render();
    apiPost({action:"abrir_jornada"}).then(function(d){
      state.jornadaBusy=false;
      if(d&&d.ok&&d.jornada){ setJornada(d.jornada); }
      else { state.errorMsg="No se pudo abrir la jornada"; }
      render();
    }).catch(function(){ state.jornadaBusy=false; state.errorMsg="Sin conexión — no se abrió la jornada"; render(); });
  }
  function closeJornada(){ var j=state.jornada; if(!j) return null;
    state.jornada=null; saveJornada(null);
    apiPost({action:"cerrar_jornada", id:j.id});   // la UI ya cerró; el servidor se entera (fire-and-forget)
    return j; }
  // Cierre automático a las 6 AM aunque la app quede abierta. Devuelve true si cerró algo.
  function autoCerrarSiVence(){
    if(state.jornada && Date.now()>=cierre6(state.jornada.inicio)){
      var j=state.jornada; state.jornada=null; saveJornada(null);
      apiPost({action:"cerrar_jornada", id:j.id});
      return true;
    }
    return false;
  }

  // Relación partida→jornada en el teléfono (respaldo si el backend aún no guarda la columna).
  var LS_MAP="truco_jpart_v1";
  function loadMap(){ try{ return JSON.parse(localStorage.getItem(LS_MAP)||"{}")||{}; }catch(e){ return {}; } }
  function saveMapEntry(idPartida, jid){ try{ var m=loadMap(); m[String(idPartida)]=String(jid); localStorage.setItem(LS_MAP, JSON.stringify(m)); }catch(e){} }
  // Jornada de una partida: la del servidor si vino, si no la guardada en el teléfono.
  function jornadaDeP(pa){ var v=(pa.jornada!=null && pa.jornada!=="")?String(pa.jornada):""; if(v) return v; return loadMap()[String(pa.id_partida)]||""; }

  function hhmm(ms){ var x=new Date(ms); return ("0"+x.getHours()).slice(-2)+":"+("0"+x.getMinutes()).slice(-2); }
  var DIAS=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"], MESES=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  function fechaLarga(ms){ var x=new Date(ms); return DIAS[x.getDay()]+" "+x.getDate()+" "+MESES[x.getMonth()]; }
  function jms(pa){ if(!pa.fecha) return null; var t=new Date(pa.fecha).getTime(); return isNaN(t)?null:t; }

  // Lista de jornadas agrupando partidas por su campo .jornada → [{jid,inicio,fin,n,total,abierta}] desc.
  function listaJornadas(){
    var by={};
    (state.partidas||[]).forEach(function(pa){
      var jid=jornadaDeP(pa); if(!jid) return;
      if(!by[jid]) by[jid]={jid:jid, inicio:null, fin:null, n:0, total:0};
      var g=by[jid]; g.n++; g.total+=Number(pa.monto)||0;
      var t=jms(pa); if(t!=null){ if(g.inicio==null||t<g.inicio) g.inicio=t; if(g.fin==null||t>g.fin) g.fin=t; }
    });
    if(state.jornada && !by[state.jornada.id]) by[state.jornada.id]={jid:state.jornada.id, inicio:state.jornada.inicio, fin:null, n:0, total:0};
    var arr=Object.keys(by).map(function(k){ var g=by[k];
      g.abierta=!!(state.jornada && state.jornada.id===g.jid);
      if(g.inicio==null) g.inicio=Number(g.jid)||0;
      if(g.fin==null) g.fin=g.inicio;
      return g; });
    arr.sort(function(a,b){ return b.inicio-a.inicio; });
    return arr;
  }
  function idsANombres(idsStr){ return String(idsStr||"").split(",").map(function(s){return s.trim();}).filter(Boolean)
    .map(function(id){ var p=player(String(id)); return p?p.nombre:String(id); }); }
  function partidasDeJornada(jid){
    return (state.partidas||[]).filter(function(pa){ return jornadaDeP(pa)===String(jid); })
      .sort(function(a,b){ return (jms(a)||0)-(jms(b)||0); });
  }
  // Saldos netos por persona + a quién le paga cada uno (menos transferencias posibles).
  function saldosJornada(jid){
    var by={};
    function nameOf(id){ var p=player(String(id)); return p?fullname(p):String(id); }
    function ensure(id){ var nm=nameOf(id); if(!by[nm]) by[nm]={name:nm,plata:0}; return by[nm]; }
    (state.partidas||[]).forEach(function(pa){
      if(jornadaDeP(pa)!==String(jid)) return;
      var e1=String(pa.equipo_1||"").split(",").map(function(s){return s.trim();}).filter(Boolean);
      var e2=String(pa.equipo_2||"").split(",").map(function(s){return s.trim();}).filter(Boolean);
      var ganEq=String(pa.ganador).indexOf("2")>=0?2:1, monto=Number(pa.monto)||0;
      e1.forEach(function(id){ var r=ensure(id); r.plata+=(ganEq===1?monto:-monto); });
      e2.forEach(function(id){ var r=ensure(id); r.plata+=(ganEq===2?monto:-monto); });
    });
    var saldos=Object.keys(by).map(function(k){return by[k];}).sort(function(a,b){return b.plata-a.plata;});
    return { saldos:saldos, pagos:settle(saldos) };
  }
  // Algoritmo de saldado: empareja al que más debe con el que más tiene a favor.
  function settle(saldos){
    var deu=[], acr=[];
    saldos.forEach(function(s){ var v=Math.round(s.plata); if(v<0) deu.push({name:s.name,m:-v}); else if(v>0) acr.push({name:s.name,m:v}); });
    deu.sort(function(a,b){return b.m-a.m;}); acr.sort(function(a,b){return b.m-a.m;});
    var pagos=[], i=0, j=0, guard=0;
    while(i<deu.length && j<acr.length && guard++<999){
      var pay=Math.min(deu[i].m, acr[j].m);
      if(pay>0) pagos.push({de:deu[i].name, a:acr[j].name, monto:pay});
      deu[i].m-=pay; acr[j].m-=pay;
      if(deu[i].m<=0) i++;
      if(acr[j].m<=0) j++;
    }
    return pagos;
  }

  /* ---------- API (Google Sheets) ---------- */
  function mapJug(arr){ return (arr||[]).map(function(j){ return {id:j.id_jugador, nombre:j.nombre, apellido:j.apellido, pj:Number(j.jugados)||0, g:Number(j.ganados)||0}; }); }
  function apiGet(){ return fetch(API_URL+"?token="+encodeURIComponent(API_TOKEN)+"&_="+Date.now()).then(function(r){return r.json();}); }
  function apiPost(p){ p.token=API_TOKEN; return fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(p)}).then(function(r){return r.json();}); }
  function cargar(){
    state.cargando=true; state.errorMsg=""; render();
    apiGet().then(function(d){
      if(d&&d.ok){ state.players=mapJug(d.jugadores); state.partidas=d.partidas||[];
        // jornada abierta: el servidor manda (compartida entre todos)
        if(d.jornada_abierta){ setJornada(d.jornada_abierta); } else { state.jornada=null; saveJornada(null); }
        autoCerrarSiVence();
        state.errorMsg=""; }
      else { state.errorMsg="No se pudo leer la base"; }
      state.cargando=false; render();
    }).catch(function(){ state.cargando=false; state.errorMsg="Sin conexión con la base"; render(); });
  }

  /* ---------- Torneos (rosters precargados) ---------- */
  var TORNEOS={
    Telaso:["Mariano Barisch","Guido Jude","Tomi Couriel","Marto Fridman","Tochu Wilhelm","Lucas Doberti","Bran Serebriani","Sebo Hochbaum","Toto Leker","Bata Burst"],
    Famosa:["Mariano Barisch","Guido Jude","Maro Faiman","Luki Gamar","Rifle Alfie","Tano Scolnik","Diego Kestel","Garo Getjman","Maxi Abuaf","Toto Leker","Fede Levin","Alu Fainsod","Ari Bolto","Alan Kronik","Nana Zylber","Sega Schor"]
  };
  function rosterNames(tn){
    if(tn==="Mix"){ var s=TORNEOS.Telaso.concat(TORNEOS.Famosa), seen={}, out=[]; s.forEach(function(n){ if(!seen[n]){ seen[n]=1; out.push(n); } }); return out; }
    return TORNEOS[tn]||[];
  }
  function cargarRoster(tn){
    rosterNames(tn).forEach(function(full){
      var i=full.indexOf(" "); var nom=i<0?full:full.slice(0,i); var ape=i<0?"":full.slice(i+1);
      var ex=state.players.some(function(p){ return norm2(fullname(p))===norm2(full); });
      if(!ex){ state.players.push({id:"tmp"+(state.nextId++), nombre:nom, apellido:ape, pj:0, g:0, nuevo:true}); }
    });
  }

  /* ---------- fósforos ---------- */
  function squareSVG(n){
    var a=10,b=50, seg=[[a,a,b,a],[b,a,b,b],[b,b,a,b],[a,b,a,a],[a,b,b,a]], s='<svg viewBox="0 0 60 60">';
    for(var i=0;i<n;i++){var g=seg[i];
      s+='<line x1="'+g[0]+'" y1="'+g[1]+'" x2="'+g[2]+'" y2="'+g[3]+'" stroke="#ece0c2" stroke-width="5" stroke-linecap="round"/>';
      s+='<circle cx="'+g[0]+'" cy="'+g[1]+'" r="4.5" fill="#c0392b"/><circle cx="'+g[2]+'" cy="'+g[3]+'" r="4.5" fill="#c0392b"/>';
    }
    return s+'</svg>';
  }
  // 3 lugares fijos por mitad: cada cuadrado siempre en su posición (como anotador real)
  function slotsHTML(pts){ var out=''; for(var s=0;s<3;s++){ var base=s*5; var n = pts>=base+5 ? 5 : (pts>base ? pts-base : 0); out+='<div class="slot-sq">'+(n>0?squareSVG(n):'')+'</div>'; } return out; }

  /* ---------- ranking: stats calculadas desde las partidas ---------- */
  // scope: "global" | "Famosa" | "Telaso". Mismo nombre = misma persona. Mix cuenta solo en global.
  function statsFor(scope){
    var by={};
    function nameOf(id){ var p=player(String(id)); return p?fullname(p):String(id); }
    function ensure(id){ var nm=nameOf(id); if(!by[nm]) by[nm]={name:nm,pj:0,g:0,plata:0}; return by[nm]; }
    (state.partidas||[]).forEach(function(pa){
      if(scope!=="global" && String(pa.torneo)!==scope) return;
      var e1=String(pa.equipo_1||"").split(",").map(function(s){return s.trim();}).filter(Boolean);
      var e2=String(pa.equipo_2||"").split(",").map(function(s){return s.trim();}).filter(Boolean);
      var ganEq=String(pa.ganador).indexOf("2")>=0?2:1;
      var monto=Number(pa.monto)||0;
      e1.forEach(function(id){ var r=ensure(id); r.pj++; if(ganEq===1){r.g++; r.plata+=monto;} else r.plata-=monto; });
      e2.forEach(function(id){ var r=ensure(id); r.pj++; if(ganEq===2){r.g++; r.plata+=monto;} else r.plata-=monto; });
    });
    return Object.keys(by).map(function(k){return by[k];});
  }

               '<div class="jr-main"><div class="jr-date">'+fechaLarga(g.inicio)+(g.abierta?' <span class="jr-live">en curso</span>':'')+'</div>'+
               '<div class="jr-sub">'+rango+' · '+g.n+' partido'+(g.n===1?'':'s')+'</div></div>'+
               '<div class="jr-tot">'+(g.total?pesos(g.total):'—')+'</div>'+
               '<span class="jr-chev">'+ic("chevron",18)+'</span></div>';
        });
        h+='</div>';
      }
      h+='</div>'; view.innerHTML=h;
    }

    else if(v==="jornadaDet"){
      title.textContent="Jornada"; hr.style.visibility="hidden";
      var jid=state.jornadaSel, data=saldosJornada(jid);
      var meta=listaJornadas().filter(function(g){return g.jid===String(jid);})[0];
      var h='<div class="scroll">';
      if(meta){
        h+='<div class="jdhead"><div class="jd-date">'+fechaLarga(meta.inicio)+(meta.abierta?' <span class="jr-live">en curso</span>':'')+'</div>'+
           '<div class="jd-sub">'+(meta.n?hhmm(meta.inicio)+' – '+hhmm(meta.fin):'sin partidos')+' · '+meta.n+' partido'+(meta.n===1?'':'s')+'</div></div>';
      }
      h+='<div class="label" style="margin-top:6px">Saldos del día</div>';
      if(data.saldos.length===0){
        h+='<div class="rk-empty">Sin partidos en esta jornada todavía.</div>';
      } else {
        h+='<div class="sd-list">';
        data.saldos.forEach(function(s){ var cls=s.plata>0?'pos':(s.plata<0?'neg':'');
          h+='<div class="sd-row"><span class="sd-name">'+esc(s.name)+'</span><span class="sd-amt '+cls+'">'+pesosFirmado(s.plata)+'</span></div>'; });
        h+='</div>';
        h+='<div class="label" style="margin-top:18px">Quién le paga a quién</div>';
        if(data.pagos.length===0){
          h+='<div class="rk-empty">Está todo saldado, nadie debe nada.</div>';
        } else {
          h+='<div class="pay-list">';
          data.pagos.forEach(function(p){
            h+='<div class="pay-row"><span class="pay-de">'+esc(p.de)+'</span><span class="pay-arrow">'+ic("arrow",16)+'</span>'+
               '<span class="pay-a">'+esc(p.a)+'</span><span class="pay-m">'+pesos(p.monto)+'</span></div>'; });
          h+='</div>';
        }
        // lista de partidos con opción de borrar
        var pts=partidasDeJornada(jid);
        h+='<div class="label" style="margin-top:18px">Partidos ('+pts.length+')</div><div class="pt-list">';
        pts.forEach(function(pa){
          var ganEq=String(pa.ganador).indexOf("2")>=0?2:1;
          var ganNames=idsANombres(ganEq===1?pa.equipo_1:pa.equipo_2);
          h+='<div class="pt-row"><div class="pt-main">'+
               '<div class="pt-win">'+ic("trophy",14)+' '+esc(ganNames.join(" · "))+'</div>'+
               '<div class="pt-sub">'+hhmm(jms(pa))+' · '+esc(pa.torneo||"—")+' · '+pesos(Number(pa.monto)||0)+'</div>'+
             '</div><button class="pt-del" data-action="del:partida" data-id="'+esc(pa.id_partida)+'" aria-label="Borrar">'+ic("trash",18)+'</button></div>';
        });
        h+='</div>';
      }
      h+='</div>'; view.innerHTML=h;
    }
  }

  /* ---------- overlays ---------- */
  function openMenu(){
    var sc=$("#scrim");
    sc.innerHTML='<div class="menu">'+
      '<div class="mtitle">Truco</div>'+
      '<div class="mitem" data-action="nav:anotador">'+ic("cards",20)+' Anotador</div>'+
      '<div class="mitem" data-action="nav:ranking">'+ic("trophy",20)+' Ranking</div>'+
      '<div class="mitem" data-action="nav:jornadas">'+ic("cal",20)+' Jornadas</div>'+
      '<div class="mitem" data-action="scrim:close">'+ic("x",20)+' Cerrar</div></div>';
    sc.classList.add("show");
  }
  function openSheet(ti,s){
    state.sheet={t:ti,s:s}; state.search="";
    renderSheet(); $("#scrim").classList.add("show");
    setTimeout(function(){ var i=$("#searchInput"); if(i) i.focus(); },80);
  }
  function renderSheet(){
    var sc=$("#scrim"), q=norm2(state.search);
    var taken=chosenIds();
    var rset=null;
    if(state.setup.torneo && state.setup.torneo!=="Mix"){ rset={}; rosterNames(state.setup.torneo).forEach(function(n){ rset[n]=1; }); }
    var list=state.players.filter(function(p){
      if(rset && !rset[p.nombre+" "+p.apellido]) return false;
      return !q || norm2(fullname(p)).indexOf(q)>=0;
    });
    var items='';
    list.forEach(function(p){
      var dis=taken.indexOf(p.id)>=0;
      items+='<div class="pitem'+(dis?' dis':'')+'" '+(dis?'':'data-action="sheet:pick" data-id="'+p.id+'"')+'>'+
        '<span style="color:#cdbf9a">'+ic("user",18)+'</span><span>'+esc(fullname(p))+'</span>'+(dis?'<span class="tag">ya en juego</span>':'')+'</div>';
    });
    var txt=state.search.trim();
    var addRow = txt
      ? '<div class="addrow" data-action="sheet:create"><span class="addic">'+ic("plus",20)+'</span><div><div class="addmain">Agregar «'+esc(txt)+'»</div><div class="addsub">Jugador nuevo</div></div></div>'
      : '<div class="addrow hint"><span class="addic">'+ic("user",20)+'</span><div><div class="addsub">Escribí nombre y apellido arriba para agregar un jugador nuevo</div></div></div>';
    sc.innerHTML='<div class="sheet"><div class="sheet-inner">'+
      '<h3>Elegir jugador</h3>'+
      '<div class="search"><span style="color:#9c8a63">'+ic("search",18)+'</span><input id="searchInput" placeholder="Buscar o escribir nombre y apellido" value="'+esc(state.search)+'"></div>'+
      addRow+
      '<div class="plist">'+items+'</div></div></div>';
    var inp=$("#searchInput");
    if(inp){ inp.oninput=function(){ state.search=this.value; var pos=this.selectionStart; renderSheet(); var n=$("#searchInput"); if(n){n.focus(); try{n.setSelectionRange(pos,pos);}catch(e){}} }; }
  }
  function closeScrim(){ var sc=$("#scrim"); sc.classList.remove("show"); state.sheet=null; setTimeout(function(){ if(!sc.classList.contains("show")) sc.innerHTML=""; },60); }

  function montoPartida(g,w){ var esDoble=g.score[1-w]<15; return {esDoble:esDoble, monto:esDoble?g.apuesta.doble:g.apuesta.simple}; }
  function winnerModal(w){
    var g=state.active;
    var names=g.teams[w].map(function(id){return esc(player(id).nombre);}).join(", ");
    var sc=$("#scrim");
    var mp=montoPartida(g,w);
    var montoLine='<p style="margin:0 0 14px;font-size:15px;color:'+(mp.esDoble?"#7ec47e":"#e7d6a8")+'">'+
      (mp.esDoble?"¡Ganaron en las malas! Se cobra <b>doble</b>: ":"Se cobra: ")+'<b>'+pesos(mp.monto)+'</b> por persona</p>';
    var err = state.errorMsg ? '<p style="color:#e8b34a">'+state.errorMsg+'</p>' : '';
    var btns = state.guardando
      ? '<button class="primary" disabled style="opacity:.6;width:100%">Guardando…</button>'
      : '<div class="row"><button class="ghost danger" data-action="discard">Descartar</button>'+
        '<button class="primary" data-action="finalize" data-w="'+w+'">Guardar partida</button></div>';
    sc.innerHTML='<div class="modal"><div class="trophy">'+ic("trophy",42)+'</div>'+
      '<h2>¡Ganó '+(w===0?"Nos":"Ellos")+'!</h2>'+
      '<p style="margin:6px 0 6px">'+names+'<br>+1 victoria para cada uno</p>'+montoLine+err+btns+'</div>';
    sc.classList.add("show");
  }

  function confirmModal(){
    var c=state.confirm; if(!c) return;
    var sc=$("#scrim");
    sc.innerHTML='<div class="modal"><h2 style="font-size:20px;margin-top:0">'+esc(c.title||"¿Seguro?")+'</h2>'+
      '<p>'+esc(c.msg||"")+'</p>'+
      '<div class="row"><button class="ghost" data-action="confirm:no">Cancelar</button>'+
      '<button class="del-btn" data-action="confirm:yes">'+esc(c.ok||"Borrar")+'</button></div></div>';
    sc.classList.add("show");
  }
  function borrarPartida(id){
    var sc=$("#scrim"); sc.innerHTML='<div class="modal"><p style="margin:0">Borrando…</p></div>'; sc.classList.add("show");
    apiPost({action:"borrar_partida", id_partida:id}).then(function(d){
      if(d&&d.ok){ state.players=mapJug(d.jugadores); state.partidas=d.partidas||[]; state.errorMsg=""; closeScrim(); render(); }
      else { state.errorMsg=(d&&d.error)?("Error: "+d.error):"No se pudo borrar"; closeScrim(); render(); }
    }).catch(function(){ state.errorMsg="Sin conexión — no se borró"; closeScrim(); render(); });
  }

  /* ---------- acciones ---------- */
  function finalize(w){
    var g=state.active, mp=montoPartida(g,w);
    function pp(id){ var p=player(id); return p.nuevo ? {nombre:p.nombre,apellido:p.apellido} : {id:p.id,nombre:p.nombre,apellido:p.apellido}; }
    var payload={ action:"guardar_partida", torneo:g.torneo||"", modo:g.modo+"v"+g.modo, ganador:w+1,
      puntos:g.score[0]+" a "+g.score[1],
      apuesta_simple:g.apuesta.simple, apuesta_doble:g.apuesta.doble, monto:mp.monto,
      jornada: state.jornada ? state.jornada.id : "",
      equipos:{ 1:g.teams[0].map(pp), 2:g.teams[1].map(pp) } };
    var tor=g.torneo;
    state.guardando=true; state.errorMsg=""; winnerModal(w);
    apiPost(payload).then(function(d){
      state.guardando=false;
      if(d&&d.ok){ state.players=mapJug(d.jugadores); if(d.partidas) state.partidas=d.partidas;
        if(state.jornada && d.id_partida) saveMapEntry(d.id_partida, state.jornada.id);
        state.active=null; closeScrim();
        state.rankScope=(tor==="Famosa"||tor==="Telaso")?tor:"global"; state.view="ranking"; render(); }
      else { state.errorMsg=(d&&d.error)?("Error: "+d.error):"No se pudo guardar"; winnerModal(w); }
    }).catch(function(){ state.guardando=false; state.errorMsg="Sin conexión — no se guardó"; winnerModal(w); });
  }

  document.addEventListener("click",function(e){
    var t=e.target.closest("[data-action]"); if(!t) return;
    var a=t.getAttribute("data-action");
    if(a==="menu:open") return openMenu();
    if(a==="scrim:close") return closeScrim();
    if(a==="nav:anotador"){ closeScrim(); state.view="anotador"; return render(); }
    if(a==="nav:ranking"){ closeScrim(); state.view="ranking"; return render(); }
    if(a==="nav:jornadas"){ closeScrim(); state.view="jornadas"; return render(); }
    if(a==="jornada:start"){ return startJornada(); }
    if(a==="jornada:close"){ var jc=closeJornada(); state.jornadaSel=jc?jc.id:null; state.view=jc?"jornadaDet":"anotador"; return render(); }
    if(a==="jornada:open"){ state.jornadaSel=t.getAttribute("data-jid"); state.view="jornadaDet"; return render(); }
    if(a==="del:partida"){ state.confirm={title:"Borrar partida", msg:"Se borra esta partida y se reajustan los saldos y el ranking. No se puede deshacer.", ok:"Borrar", action:"borrar_partida", id:t.getAttribute("data-id")}; return confirmModal(); }
    if(a==="confirm:no"){ state.confirm=null; return closeScrim(); }
    if(a==="confirm:yes"){ var cf=state.confirm; state.confirm=null; if(cf&&cf.action==="borrar_partida") return borrarPartida(cf.id); return closeScrim(); }
    if(a==="nav:nueva"){ state.setup={torneo:null, modo:3, teams:[[null,null,null],[null,null,null]], apuesta:{preset:"custom",simple:null,doble:null}}; state.view="nueva"; return render(); }
    if(a==="apuesta"){ var pr=t.getAttribute("data-preset"); state.setup.apuesta.preset=pr;
      if(pr!=="custom"){ state.setup.apuesta.simple=+t.getAttribute("data-s"); state.setup.apuesta.doble=+t.getAttribute("data-d"); }
      return render(); }
    if(a==="mode"){ var m=+t.getAttribute("data-m"); state.setup.modo=m; state.setup.teams=[[],[]];
      for(var i=0;i<m;i++){state.setup.teams[0].push(null); state.setup.teams[1].push(null);} return render(); }
    if(a==="slot:open"){ return openSheet(+t.getAttribute("data-t"), +t.getAttribute("data-s")); }
    if(a==="slot:clear"){ state.setup.teams[+t.getAttribute("data-t")][+t.getAttribute("data-s")]=null; return render(); }
    if(a==="sheet:pick"){ state.setup.teams[state.sheet.t][state.sheet.s]=t.getAttribute("data-id"); closeScrim(); return render(); }
    if(a==="sheet:create"){ var raw=state.search.trim().replace(/\s+/g," "); var parts=raw.split(" "); var nom=parts.shift()||"Jugador"; var ape=parts.join(" ");
      var key=norm2(nom+" "+ape);
      var ex=state.players.find(function(p){ return norm2(fullname(p))===key; });   // reusar si ya existe (dedup)
      var chosen=ex || {id:"tmp"+(state.nextId++), nombre:nom, apellido:ape, pj:0, g:0, nuevo:true};
      if(!ex) state.players.push(chosen);
      state.setup.teams[state.sheet.t][state.sheet.s]=chosen.id; closeScrim(); return render(); }
    if(a==="start"){ var ap=state.setup.apuesta; state.active={torneo:state.setup.torneo, modo:state.setup.modo, teams:[state.setup.teams[0].slice(),state.setup.teams[1].slice()], score:[0,0], apuesta:{simple:ap.simple, doble:ap.doble}}; state.view="anotador"; return render(); }
    if(a==="plus"||a==="minus"){ var ti=+t.getAttribute("data-t"); var d=a==="plus"?1:-1;
      var g=state.active; g.score[ti]=Math.max(0,Math.min(LIMIT,g.score[ti]+d)); render();
      if(g.score[ti]>=LIMIT) winnerModal(ti); return; }
    if(a==="discard"){ state.active=null; closeScrim(); state.view="anotador"; return render(); }
    if(a==="finalize"){ return finalize(+t.getAttribute("data-w")); }
    if(a==="rank:sort"){ state.rankSort=t.getAttribute("data-k"); return render(); }
    if(a==="rank:scope"){ state.rankScope=t.getAttribute("data-sc"); return render(); }
    if(a==="reload"){ return cargar(); }
  });
  document.addEventListener("change",function(e){
    var s=e.target.closest("[data-change]"); if(!s) return;
    if(s.getAttribute("data-change")==="torneo"){
      var tn=s.value||null; state.setup.torneo=tn;
      if(tn) cargarRoster(tn);
      var mm=state.setup.modo; state.setup.teams=[[],[]];
      for(var k=0;k<mm;k++){state.setup.teams[0].push(null); state.setup.teams[1].push(null);}
      return render();
    }
  });
  $("#scrim").addEventListener("click",function(e){ if(e.target===this) closeScrim(); });

  // Cierre automático de la jornada a las 6 AM aunque la app quede abierta (timer + al volver a foco).
  setInterval(function(){ if(autoCerrarSiVence()) render(); }, 60000);
  document.addEventListener("visibilitychange", function(){ if(!document.hidden && autoCerrarSiVence()) render(); });

  state.jornada=loadJornada();   // caché instantánea (el servidor reconcilia al cargar)
  cargar();
})();
</script>
</body>
</html>
